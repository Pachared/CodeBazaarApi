version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: codebazaar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: codebazaar
      POSTGRES_USER: codebazaar
      POSTGRES_PASSWORD: codebazaar
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
